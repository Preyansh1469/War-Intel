version: '3.8'

services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: tracking_db
      POSTGRES_USER: tracking_user
      POSTGRES_PASSWORD: tracking_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - '6379:6379'

  tracking_service:
    build:
      context: ./tracking_service
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - '8080:8080'

volumes:
  postgres_data: